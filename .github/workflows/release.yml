name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: '1.26'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup ko
        uses: ko-build/setup-ko@v0.9

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push with ko
        id: ko
        env:
          KO_DOCKER_REPO: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          digest=$(ko build ./cmd/provider \
            --bare \
            --tags=${{ github.ref_name }},latest \
            --platform=linux/amd64,linux/arm64)
          echo "digest=$digest" >> $GITHUB_OUTPUT

      - name: Sign container image with cosign
        env:
          DIGEST: ${{ steps.ko.outputs.digest }}
        run: |
          cosign sign --yes $DIGEST

      - name: Verify signature
        env:
          DIGEST: ${{ steps.ko.outputs.digest }}
        run: |
          cosign verify $DIGEST \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.ko.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        env:
          DIGEST: ${{ steps.ko.outputs.digest }}
        run: |
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson $DIGEST

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sbom.spdx.json
