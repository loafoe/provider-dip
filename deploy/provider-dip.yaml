apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-dip
  namespace: crossplane-system
  labels:
    app: provider-dip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: provider-dip
  template:
    metadata:
      labels:
        app: provider-dip
    spec:
      serviceAccountName: provider-dip
      containers:
      - name: provider
        image: ghcr.io/loafoe/provider-dip:dev
        imagePullPolicy: Always
        args:
        - --debug
        ports:
        - containerPort: 8080
          name: metrics
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-dip
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-dip
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: provider-dip
  namespace: crossplane-system
